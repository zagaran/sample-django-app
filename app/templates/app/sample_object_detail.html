{% extends "base_templates/base.html" %}

{% block title %}Dashboard{% endblock %}

{% block body %}
<div id="app">
  <div>
    <h3>Sample Object {{ sample_object.name }}</h3>
    <span>Created By {{ sample_object.created_by }} on {{ sample_object.created_on }}</span>
  </div>

  <div class="card my-4">
    <div class="card-body">
      <h4 class="card-title">Description</h4>
      <p>{{ sample_object.description }}</p>
    </div>
  </div>
</div>
{% endblock %}
