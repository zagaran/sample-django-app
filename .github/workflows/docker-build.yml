
name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Deploy Environment
        default: test
        options:
          - prod
          - test

      branch:
        description: Branch to build

permissions:
  id-token: write
  contents: read

concurrency:
  group: build-image-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker Image (${{ inputs.branch }})
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Configure AWS credentials
        id: aws-credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Configure AWS CLI profile
        shell: bash
        run: |
          aws configure set aws_access_key_id ${{ env.AWS_ACCESS_KEY_ID }} --profile ${{ vars.AWS_PROFILE_NAME }}
          aws configure set aws_secret_access_key ${{ env.AWS_SECRET_ACCESS_KEY }} --profile ${{ vars.AWS_PROFILE_NAME }}
          aws configure set aws_session_token ${{ env.AWS_SESSION_TOKEN }} --profile ${{ vars.AWS_PROFILE_NAME }}
          aws configure set region us-east-1 --profile ${{ vars.AWS_PROFILE_NAME }}

      - name: Check Profile
        shell: bash
        run: aws sts get-caller-identity --profile ${{ vars.AWS_PROFILE_NAME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.3
          terraform_wrapper: false

      - name: Set up Docker Buildx builder
        shell: bash
        run: |
          docker buildx create --name containerd-builder --driver docker-container --use || true
          docker buildx inspect --bootstrap

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ACTIONS_SSH_KEY }}

      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Copy default .env file
        working-directory: config
        run: cp .env.build .env

      - name: Terraform init
        shell: bash
        working-directory: ./terraform/deployments/${{ inputs.environment }}
        env:
          AWS_PROFILE: ${{ vars.AWS_PROFILE_NAME }}
        run: |
          terraform init

      - name: Build and upload image to ${{ inputs.environment }}
        run: uv run deploy docker-build ${{ inputs.environment }} -b ${{ inputs.branch }}
